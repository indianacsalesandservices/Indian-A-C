<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Request - Indian A/C</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="public-page" id="publicPage">
    <div class="public-card" style="max-width:600px;">
        <img src="/logo.png" alt="Logo" style="width:60px;height:60px;border-radius:12px;margin-bottom:8px;" onerror="this.style.display='none'">
        <h1>Leave Request</h1>
        <p class="public-sub">Submit a leave request to admin</p>

        <div class="public-clock" id="publicClock"></div>

        <div id="leaveNameSection">
            <div class="form-group">
                <label>Enter Your Name</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <div class="search-box" style="flex:1;">
                        <span class="search-icon">&#128269;</span>
                        <input type="text" id="leaveNameInput" placeholder="Type your full name..." autocomplete="off" style="padding-left:36px;">
                    </div>
                    <span class="mic-btn" data-target="leaveNameInput" title="Search by voice" onclick="App.startVoiceSearch(this)">&#127908;</span>
                </div>
                <div class="att-name-match" id="leaveNameMatch"></div>
            </div>
        </div>

        <!-- LEAVE REQUEST FORM (hidden until name matched) -->
        <div id="leaveFormWrap" style="display:none;text-align:left;">
            <div id="leaveStaffLabel" style="font-size:14px;font-weight:600;margin-bottom:16px;padding:10px 14px;background:var(--gray-50);border-radius:8px;"></div>

            <div class="form-group">
                <label>Leave Type</label>
                <select id="leaveType" class="form-control">
                    <option value="Annual">Annual Leave</option>
                    <option value="Sick">Sick Leave</option>
                    <option value="Personal">Personal Leave</option>
                    <option value="Emergency">Emergency Leave</option>
                    <option value="Maternity">Maternity Leave</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="leaveStartDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="leaveEndDate" class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea id="leaveReason" class="form-control" rows="3" placeholder="Reason for leave..."></textarea>
            </div>
            <button class="btn btn-primary btn-block" onclick="App.submitLeave()" style="margin-top:4px;">Submit Leave Request</button>
        </div>

        <!-- PAST LEAVE REQUESTS (hidden until name matched) -->
        <div id="leaveHistoryWrap" style="display:none;text-align:left;margin-top:24px;">
            <h3 style="font-size:16px;color:var(--gray-800);margin-bottom:12px;border-bottom:2px solid var(--gray-200);padding-bottom:8px;">My Leave Requests</h3>
            <div id="leaveHistoryList"></div>
        </div>

        <div class="public-footer">
            <button type="button" class="admin-access-btn" onclick="window.location.href='/attendance/'">&#8592; Back to Attendance</button>
            <button type="button" class="admin-access-btn" onclick="window.location.href='/'">Back to Portal</button>
        </div>
    </div>
</div>

<script src="/auth.js"></script>
<script src="data.js?v=3"></script>
<script src="app-leave.js"></script>
<div style="text-align:center;padding:16px 0;color:rgba(255,255,255,0.35);font-size:0.75rem;">Tech support: Tony 6385691188</div>
</body>
</html>
