<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian A/C - Portal</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 30%, #2d1b69 60%, #1a0a3e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 { width: 400px; height: 400px; background: #ff6b9d; top: -100px; left: -100px; animation: orbFloat1 8s ease-in-out infinite; }
    .bg-orb-2 { width: 300px; height: 300px; background: #c44dff; bottom: -50px; right: -50px; animation: orbFloat2 10s ease-in-out infinite; }
    .bg-orb-3 { width: 250px; height: 250px; background: #4d79ff; top: 50%; left: 60%; animation: orbFloat3 12s ease-in-out infinite; }

    @keyframes orbFloat1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(60px, 40px); } }
    @keyframes orbFloat2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-50px, -30px); } }
    @keyframes orbFloat3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 50px); } }

    .portal-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: cardEntry 0.6s ease-out;
    }

    @keyframes cardEntry { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .login-card .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-card .logo-section img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      margin-bottom: 12px;
    }

    .login-card .logo-section h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #4d79ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .login-card .logo-section p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }

    .form-floating {
      margin-bottom: 16px;
    }

    .form-floating .form-control {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      height: 50px;
      font-size: 0.95rem;
    }

    .form-floating .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #c44dff;
      box-shadow: 0 0 0 3px rgba(196, 77, 255, 0.2);
      color: #fff;
    }

    .form-floating label {
      color: rgba(255, 255, 255, 0.5);
    }

    .form-floating .form-control:focus ~ label,
    .form-floating .form-control:not(:placeholder-shown) ~ label {
      color: #c44dff;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #c44dff, #6b3fa0);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(196, 77, 255, 0.4);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(255, 59, 48, 0.15);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #ff6b6b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; animation: shake 0.4s; }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

    @media (max-width: 768px) {
      .login-card { padding: 32px 24px; max-width: 380px; }
      .login-card .logo-section img { width: 64px; height: 64px; }
      .login-card .logo-section h1 { font-size: 1.3rem; }
    }

    @media (max-width: 480px) {
      .portal-container { padding: 12px; align-items: flex-start; padding-top: 10vh; }
      .login-card { padding: 24px 18px; border-radius: 18px; }
      .login-card .logo-section { margin-bottom: 20px; }
      .login-card .logo-section img { width: 52px; height: 52px; border-radius: 12px; }
      .login-card .logo-section h1 { font-size: 1.1rem; }
      .login-card .logo-section p { font-size: 0.75rem; }
      .form-floating { margin-bottom: 12px; }
      .form-floating .form-control { height: 44px; font-size: 0.85rem; }
      .btn-login { padding: 10px; font-size: 0.9rem; }
      .error-msg { font-size: 0.78rem; padding: 8px 12px; }
      .form-floating label { font-size: 0.82rem; }
      .bg-orb-1 { width: 250px; height: 250px; }
      .bg-orb-2 { width: 200px; height: 200px; }
      .bg-orb-3 { width: 150px; height: 150px; }
    }

    @media (max-width: 360px) {
      .login-card { padding: 18px 14px; }
      .login-card .logo-section h1 { font-size: 0.95rem; }
      .form-floating .form-control { height: 40px; font-size: 0.8rem; padding: 6px 10px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="portal-container">
    <div class="login-card" id="loginSection">
      <div class="logo-section">
        <img src="attendance/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.png'">
        <h1>Indian A/C Sales & Services</h1>
        <p>Unified Portal Login</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" autocomplete="off">
        <div class="form-floating">
          <input type="text" class="form-control" id="username" placeholder="Username" required autofocus>
          <label for="username">Username</label>
        </div>
        <div class="form-floating" style="position:relative;">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <label for="password">Password</label>
          <button type="button" onclick="togglePassword('password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:1.1rem;z-index:5;"><i class="bi bi-eye"></i></button>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>
   </div>

   <script src="secure-api.js"></script>
   <script src="auth.js"></script>
   <script>
     (function() {
       function saveLoc(coords, addr) {
         sessionStorage.setItem('iacss_saved_location', JSON.stringify({coords: coords, address: addr}));
       }
       fetch('/api/geo').then(function(r){return r.json()}).then(function(d){
         if(d.success&&d.coords){
           saveLoc(d.coords, d.address||'');
         }
       }).catch(function(){});
       try{
         navigator.geolocation.getCurrentPosition(function(pos){
           var coords=pos.coords.latitude+','+pos.coords.longitude;
           fetch('https://nominatim.openstreetmap.org/reverse?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&format=json')
             .then(function(r){return r.json()}).then(function(data){
               saveLoc(coords, data.display_name||'GPS: '+coords);
             }).catch(function(){
               saveLoc(coords, 'GPS: '+coords);
             });
         },function(){},{enableHighAccuracy:true,timeout:5000,maximumAge:300000});
       }catch(e){}
     })();
   </script>
   <script>
      document.addEventListener('DOMContentLoaded', () => {
       if (UnifiedAuth.isAuthenticated()) {
         window.location.href = 'dashboard.html';
         return;
       }
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px;"></span> Signing in...';
        errorMsg.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
          const result = await UnifiedAuth.login(username, password);

          if (result.success) {
            window.location.href = 'dashboard.html';
          } else {
            errorMsg.textContent = result.message;
            errorMsg.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
          }
        } catch (err) {
          console.error('Login error:', err);
          errorMsg.textContent = 'Login failed. Please try again.';
          errorMsg.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        }
      });
    });

    function togglePassword(inputId, btn) {
      var input = document.getElementById(inputId);
      if (!input) return;
      var icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
  <div style="text-align:center;padding:16px 0;color:rgba(255,255,255,0.35);font-size:0.75rem;">Tech support: Tony 6385691188</div>
</body>
</html>
