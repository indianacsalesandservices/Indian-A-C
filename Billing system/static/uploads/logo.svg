<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67300;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#138808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5c04;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000066;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8f9fa"/>

  <!-- Left saffron wing -->
  <path d="M 165 60 L 300 170 L 240 170 Z" fill="url(#saffron)" filter="url(#shadow)"/>
  <path d="M 165 60 L 180 70 L 300 170 L 290 165 Z" fill="#ffb366" opacity="0.6"/>

  <!-- Right green wing -->
  <path d="M 435 60 L 300 170 L 360 170 Z" fill="url(#green)" filter="url(#shadow)"/>
  <path d="M 435 60 L 420 70 L 300 170 L 310 165 Z" fill="#2ea822" opacity="0.5"/>

  <!-- Ashoka Chakra -->
  <circle cx="300" cy="160" r="32" fill="white" stroke="#000080" stroke-width="3"/>
  <circle cx="300" cy="160" r="26" fill="none" stroke="#000080" stroke-width="1.5"/>
  <circle cx="300" cy="160" r="6" fill="#000080"/>
  <!-- 24 spokes -->
  <g stroke="#000080" stroke-width="1.2">
    <line x1="300" y1="134" x2="300" y2="148"/>
    <line x1="300" y1="172" x2="300" y2="186"/>
    <line x1="274" y1="160" x2="288" y2="160"/>
    <line x1="312" y1="160" x2="326" y2="160"/>
    <line x1="281.6" y1="141.6" x2="291.2" y2="148.8"/>
    <line x1="308.8" y1="171.2" x2="318.4" y2="178.4"/>
    <line x1="281.6" y1="178.4" x2="291.2" y2="171.2"/>
    <line x1="308.8" y1="148.8" x2="318.4" y2="141.6"/>
    <line x1="274.4" y1="148" x2="288" y2="152"/>
    <line x1="312" y1="168" x2="325.6" y2="172"/>
    <line x1="274.4" y1="172" x2="288" y2="168"/>
    <line x1="312" y1="152" x2="325.6" y2="148"/>
    <line x1="278" y1="137.2" x2="290" y2="146"/>
    <line x1="310" y1="174" x2="322" y2="182.8"/>
    <line x1="278" y1="182.8" x2="290" y2="174"/>
    <line x1="310" y1="146" x2="322" y2="137.2"/>
    <line x1="282" y1="136" x2="290" y2="147"/>
    <line x1="310" y1="173" x2="318" y2="184"/>
    <line x1="282" y1="184" x2="290" y2="173"/>
    <line x1="310" y1="147" x2="318" y2="136"/>
    <line x1="276" y1="142" x2="289" y2="150"/>
    <line x1="311" y1="170" x2="324" y2="178"/>
    <line x1="276" y1="178" x2="289" y2="170"/>
    <line x1="311" y1="150" x2="324" y2="142"/>
  </g>

  <!-- INDIAN A/C text -->
  <text x="300" y="250" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" fill="url(#navy)" filter="url(#glow)">
    INDIAN A/C
  </text>

  <!-- Blue wave under A/C -->
  <path d="M 370 254 Q 385 248 400 254 Q 415 260 430 254" fill="none" stroke="#00aaff" stroke-width="2.5" opacity="0.8"/>

  <!-- Divider lines and subtitle -->
  <line x1="150" y1="278" x2="220" y2="278" stroke="#c8a000" stroke-width="2"/>
  <line x1="380" y1="278" x2="450" y2="278" stroke="#c8a000" stroke-width="2"/>
  <text x="300" y="285" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#c8a000" letter-spacing="6">
    HOME APPLIANCES
  </text>

  <line x1="150" y1="303" x2="220" y2="303" stroke="#138808" stroke-width="2"/>
  <line x1="380" y1="303" x2="450" y2="303" stroke="#138808" stroke-width="2"/>
  <text x="300" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#138808" letter-spacing="6">
    &amp; FURNITURES
  </text>
</svg>
