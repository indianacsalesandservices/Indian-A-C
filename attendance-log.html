<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Logs - Indian A/C</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 30%, #2d1b69 60%, #1a0a3e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.25; pointer-events: none; z-index: 0; }
    .bg-orb-1 { width: 400px; height: 400px; background: #ff6b9d; top: -100px; left: -100px; }
    .bg-orb-2 { width: 300px; height: 300px; background: #c44dff; bottom: -50px; right: -50px; }

    .page-wrap { position: relative; z-index: 1; padding: 24px; max-width: 1100px; margin: 0 auto; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #4d79ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .top-bar .back-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: rgba(255,255,255,0.7); padding: 8px 16px;
      font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .top-bar .back-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .filters {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filters input, .filters select {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #fff; padding: 8px 14px; font-size: 0.85rem;
    }
    .filters input:focus, .filters select:focus { border-color: #c44dff; outline: none; }
    .filters select option { background: #1a1a4e; color: #fff; }

    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      padding: 16px; text-align: center;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; }
    .stat-card .label { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .stat-card.portal .num { color: #c44dff; }
    .stat-card.attendance .num { color: #4CAF50; }
    .stat-card.complaints .num { color: #FF9800; }
    .stat-card.billing .num { color: #2196F3; }

    .log-table-wrap {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
      overflow: hidden;
    }
    .log-table {
      width: 100%; border-collapse: collapse;
    }
    .log-table th {
      background: rgba(255,255,255,0.06);
      padding: 12px 16px; text-align: left;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .log-table td {
      padding: 12px 16px; font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .log-table tr:hover td { background: rgba(255,255,255,0.03); }
    .log-table a:hover { color: #c44dff !important; text-decoration: underline !important; }

    .badge-system {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-system.portal { background: rgba(196,77,255,0.2); color: #c44dff; }
    .badge-system.attendance { background: rgba(76,175,80,0.2); color: #4CAF50; }
    .badge-system.complaints { background: rgba(255,152,0,0.2); color: #FF9800; }
    .badge-system.billing { background: rgba(33,150,243,0.2); color: #2196F3; }

    .badge-role {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 0.7rem; font-weight: 600;
    }
    .badge-role.admin { background: rgba(255,59,48,0.2); color: #ff6b6b; }
    .badge-role.user, .badge-role.staff { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; }

    .no-auth { text-align: center; padding: 80px 20px; }
    .no-auth h2 { color: #ff6b6b; margin-bottom: 12px; }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .page-wrap { padding: 16px; }
      .top-bar { flex-direction: column; text-align: center; }
      .top-bar h1 { font-size: 1.2rem; text-align: center; }
      .top-bar > div { width: 100%; justify-content: center; }
      .top-bar .back-btn { flex: 1; text-align: center; }
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 12px; }
      .stat-card .num { font-size: 1.4rem; }
      .stat-card .label { font-size: 0.65rem; }
      .filters { flex-direction: column; }
      .filters input, .filters select { width: 100%; }
      .log-table th:nth-child(5), .log-table td:nth-child(5) { display: none; }
      .log-table td, .log-table th { padding: 8px 10px; font-size: 0.78rem; }
      .badge-system { font-size: 0.6rem; padding: 2px 6px; }
      .badge-role { font-size: 0.6rem; }
    }
    @media (max-width: 480px) {
      .page-wrap { padding: 10px; }
      .top-bar h1 { font-size: 1rem; }
      .top-bar .back-btn { font-size: 0.75rem; padding: 6px 10px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 6px; }
      .stat-card { padding: 10px; }
      .stat-card .num { font-size: 1.2rem; }
      .log-table th:nth-child(4), .log-table td:nth-child(4) { display: none; }
      .log-table th:nth-child(6), .log-table td:nth-child(6) { display: none; }
      .log-table td, .log-table th { padding: 6px 8px; font-size: 0.72rem; }
      .log-table td:nth-child(2) strong { font-size: 0.75rem; }
      .log-table td:nth-child(2) small { display: none; }
      .empty-state { padding: 40px 16px; }
      .empty-state i { font-size: 2rem; }
      .bg-orb-1 { width: 250px; height: 250px; }
      .bg-orb-2 { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="page-wrap">
    <div class="top-bar">
      <h1><img src="/logo.png" alt="Logo" style="width:32px;height:32px;border-radius:8px;vertical-align:middle;margin-right:8px;" onerror="this.style.display='none'"><i class="bi bi-clock-history"></i> Attendance Logs</h1>
      <div style="display:flex; gap:8px;">
        <a href="index.html" class="back-btn"><i class="bi bi-arrow-left"></i> Portal</a>
        <button class="back-btn" onclick="clearLogs()" id="clearBtn" style="display:none;">
          <i class="bi bi-trash"></i> Clear All
        </button>
      </div>
    </div>

    <div id="content">
      <div class="no-auth" id="noAuth" style="display:none;">
        <h2>Access Denied</h2>
        <p>Please log in from the <a href="index.html" style="color:#c44dff;">portal</a>.</p>
      </div>

      <div id="mainContent" style="display:none;">
        <div class="stats-row" id="statsRow"></div>

        <div class="filters">
          <input type="date" id="filterDate" onchange="applyFilters()">
          <select id="filterSystem" onchange="applyFilters()">
            <option value="">All Systems</option>
            <option value="portal">Portal</option>
            <option value="attendance">Attendance</option>
            <option value="complaints">Complaints</option>
            <option value="billing">Billing</option>
          </select>
          <select id="filterUser" onchange="applyFilters()">
            <option value="">All Users</option>
          </select>
        </div>

        <div class="log-table-wrap">
          <table class="log-table">
            <thead>
              <tr>
                <th>#</th>
                <th>User</th>
                <th>Role</th>
                <th>System</th>
                <th>Date & Time</th>
                <th>Location</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" style="display:none;">
            <i class="bi bi-inbox"></i>
            <p>No attendance records found</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="secure-api.js"></script>
  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!UnifiedAuth.isAuthenticated()) {
        document.getElementById('noAuth').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        return;
      }

      const session = UnifiedAuth.getSession();
      if (session.role === 'admin') {
        document.getElementById('clearBtn').style.display = 'inline-flex';
      }

      document.getElementById('mainContent').style.display = 'block';
      populateUserFilter();
      renderLogs();
    });

    async function getAllLogs() {
      return await UnifiedAuth.getAttendanceRecords();
    }

    async function populateUserFilter() {
      const logs = await getAllLogs();
      const users = [...new Set(logs.map(l => l.username))];
      const sel = document.getElementById('filterUser');
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = u;
        sel.appendChild(opt);
      });
    }

    async function applyFilters() {
      await renderLogs();
    }

    async function renderLogs() {
      let logs = await getAllLogs();
      const dateFilter = document.getElementById('filterDate').value;
      const systemFilter = document.getElementById('filterSystem').value;
      const userFilter = document.getElementById('filterUser').value;

      if (dateFilter) logs = logs.filter(l => l.date === dateFilter);
      if (systemFilter) logs = logs.filter(l => l.system === systemFilter);
      if (userFilter) logs = logs.filter(l => l.username === userFilter);

      renderStats(logs);

      const tbody = document.getElementById('logBody');
      const empty = document.getElementById('emptyState');

      if (logs.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      tbody.innerHTML = logs.map((l, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${escapeHtml(l.fullName || l.username)}</strong><br><small style="color:rgba(255,255,255,0.4)">${escapeHtml(l.username)}</small></td>
          <td><span class="badge-role ${l.role}">${l.role}</span></td>
          <td><span class="badge-system ${l.system}">${l.system}</span></td>
          <td>${l.date} ${l.time}</td>
          <td>${l.gpsCoords ? '<a href="https://www.google.com/maps?q=' + l.gpsCoords + '" target="_blank" style="color:#4d79ff;text-decoration:none;cursor:pointer;" title="' + escapeHtml(l.location || '') + '"><i class="bi bi-geo-alt-fill"></i> ' + escapeHtml(shortLoc(l.location)) + ' <i class="bi bi-box-arrow-up-right" style="font-size:.65rem;"></i></a>' : '<small style="color:rgba(255,255,255,0.5)">' + escapeHtml(l.location || 'N/A') + '</small>'}</td>
        </tr>
      `).join('');
    }

    function renderStats(logs) {
      const total = logs.length;
      const portal = logs.filter(l => l.system === 'portal').length;
      const attendance = logs.filter(l => l.system === 'attendance').length;
      const complaints = logs.filter(l => l.system === 'complaints').length;
      const billing = logs.filter(l => l.system === 'billing').length;

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="num">${total}</div><div class="label">Total Logins</div></div>
        <div class="stat-card portal"><div class="num">${portal}</div><div class="label">Portal</div></div>
        <div class="stat-card attendance"><div class="num">${attendance}</div><div class="label">Attendance</div></div>
        <div class="stat-card complaints"><div class="num">${complaints}</div><div class="label">Complaints</div></div>
        <div class="stat-card billing"><div class="num">${billing}</div><div class="label">Billing</div></div>
      `;
    }

    async function clearLogs() {
      if (confirm('Clear all attendance logs? This cannot be undone.')) {
        if (typeof SecureAPI !== 'undefined') {
          try { await SecureAPI.clearAttendance(); } catch (e) {}
        }
        localStorage.removeItem('iacss_unified_attendance');
        await renderLogs();
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function shortLoc(loc) {
      if (!loc) return 'N/A';
      if (loc.indexOf('GPS:') === 0) return loc;
      var parts = loc.split(',');
      if (parts.length >= 3) return parts.slice(0, 3).join(',').trim();
      if (parts.length >= 2) return parts.slice(0, 2).join(',').trim();
      return loc.length > 40 ? loc.substring(0, 40) + '...' : loc;
    }
  </script>
  <div style="text-align:center;padding:16px 0;color:rgba(255,255,255,0.35);font-size:0.75rem;">Tech support: Tony 6385691188</div>
</body>
</html>
