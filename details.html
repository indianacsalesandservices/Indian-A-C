<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Details - Indian A/C</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/mic-btn.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 30%,#2d1b69 60%,#1a0a3e 100%);font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;color:#fff;overflow-x:hidden}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none;z-index:0}
    .bg-orb-1{width:400px;height:400px;background:#ff6b9d;top:-100px;left:-100px;animation:o1 8s ease-in-out infinite}
    .bg-orb-2{width:300px;height:300px;background:#c44dff;bottom:-50px;right:-50px;animation:o2 10s ease-in-out infinite}
    .bg-orb-3{width:250px;height:250px;background:#4d79ff;top:50%;left:60%;animation:o3 12s ease-in-out infinite}
    @keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
    @keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
    @keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,50px)}}
    .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 20px}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .top-bar .user-info{display:flex;align-items:center;gap:10px}
    .top-bar .user-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#c44dff,#6b3fa0);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700}
    .top-bar .user-name{font-size:1rem;font-weight:600}
    .top-bar .user-role{font-size:.75rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
    .top-bar .actions{display:flex;gap:8px}
    .top-bar .actions a,.top-bar .actions button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;text-decoration:none;transition:all .2s}
    .top-bar .actions a:hover,.top-bar .actions button:hover{background:rgba(255,255,255,.12);color:#fff}
    h1.pt{font-size:1.6rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#ff6b9d,#c44dff,#4d79ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ps{color:rgba(255,255,255,.5);margin-bottom:24px;font-size:.9rem}
    .search-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .search-bar input{flex:1;min-width:200px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;padding:10px 14px;font-size:.9rem}
    .search-bar input:focus{border-color:#c44dff;outline:none}
    .search-bar input::placeholder{color:rgba(255,255,255,.35)}
    .search-bar select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;padding:10px 14px;font-size:.9rem}
    .search-bar select option{background:#1a1a4e;color:#fff}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
    .s-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;overflow:hidden;transition:all .3s}
    .s-card:hover{border-color:rgba(196,77,255,.3);box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .s-card-head{padding:20px 20px 14px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06)}
    .s-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex-shrink:0}
    .s-avatar.admin{background:linear-gradient(135deg,#ff6b9d,#c44dff)}
    .s-avatar.staff{background:linear-gradient(135deg,#4d79ff,#2d5fc9)}
    .s-name{font-weight:600;font-size:1.05rem}
    .s-role{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    .s-role.admin{background:rgba(255,107,157,.2);color:#ff6b9d}
    .s-role.staff{background:rgba(77,121,255,.2);color:#4d79ff}
    .s-section{padding:14px 20px}
    .s-section+.s-section{border-top:1px solid rgba(255,255,255,.05)}
    .s-sec-title{font-size:.7rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
    .s-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem}
    .s-label{color:rgba(255,255,255,.4)}
    .s-value{color:rgba(255,255,255,.85);text-align:right;max-width:55%;word-break:break-word}
    .s-edit{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06);display:none}
    .s-card.expanded .s-edit{display:block}
    .s-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .s-edit-grid .full{grid-column:1/-1}
    .s-edit-grid input,.s-edit-grid select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;padding:7px 10px;font-size:.78rem}
    .s-edit-grid input:focus,.s-edit-grid select:focus{border-color:#c44dff;outline:none}
    .s-edit-grid input::placeholder{color:rgba(255,255,255,.3)}
    .s-edit-grid select option{background:#1a1a4e;color:#fff}
    .s-edit-grid input[type=file]{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:.75rem;padding:8px}
    .s-btns{display:flex;gap:6px;margin-top:8px}
    .s-btns button{flex:1;border:none;border-radius:8px;padding:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
    .s-btn-save{background:linear-gradient(135deg,#c44dff,#6b3fa0);color:#fff}
    .s-btn-save:hover{box-shadow:0 4px 12px rgba(196,77,255,.3)}
    .s-btn-edit{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
    .s-btn-edit:hover{background:rgba(255,255,255,.12);color:#fff}
    .s-btn-del{background:rgba(255,59,48,.15);border:1px solid rgba(255,59,48,.3);color:#ff6b6b;max-width:60px}
    .s-btn-del:hover{background:rgba(255,59,48,.25)}
    .s-docs{margin-top:6px}
    .s-doc{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.78rem;color:rgba(255,255,255,.5)}
    .s-doc i{color:#c44dff}
    .s-doc a{color:#4d79ff;text-decoration:none}
    .empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.4)}
    .empty i{font-size:3rem;margin-bottom:16px;display:block}
    .add-new{position:fixed;bottom:24px;right:24px;z-index:10;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#c44dff,#6b3fa0);color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(196,77,255,.4);transition:all .3s}
    .add-new:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(196,77,255,.5)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
    .modal-overlay.active{display:flex}
    .modal-box{background:linear-gradient(135deg,#1a1a4e,#2d1b69);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px;width:100%;max-width:640px;animation:fadeIn .3s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .modal-box h3{font-size:1.2rem;margin-bottom:20px;background:linear-gradient(135deg,#ff6b9d,#c44dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.5);font-size:1.3rem;cursor:pointer}
    .f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .f-grid .full{grid-column:1/-1}
    .f-group{display:flex;flex-direction:column;gap:3px}
    .f-group label{font-size:.7rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    .f-group input,.f-group select,.f-group textarea{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:9px 12px;font-size:.85rem}
    .f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:#c44dff;outline:none}
    .f-group input::placeholder,.f-group textarea::placeholder{color:rgba(255,255,255,.3)}
    .f-group select option{background:#1a1a4e;color:#fff}
    .f-group input[type=file]{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:.8rem;padding:10px}
    .f-section-title{font-size:.75rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:6px}
    .f-submit{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#c44dff,#6b3fa0);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;transition:all .3s}
    .f-submit:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(196,77,255,.4)}
    @media(max-width:900px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}}
    @media(max-width:768px){
      .page{padding:16px 14px}
      .top-bar{flex-direction:column;text-align:center}
      .top-bar .user-info{justify-content:center}
      .top-bar .actions{width:100%;justify-content:center}
      .top-bar .actions a,.top-bar .actions button{flex:1;text-align:center;font-size:.75rem;padding:6px 10px}
      .card-grid{grid-template-columns:1fr}
      .f-grid{grid-template-columns:1fr}
      .s-edit-grid{grid-template-columns:1fr}
      h1.pt{font-size:1.3rem}
      .s-card-head{padding:16px 16px 12px}
      .s-section{padding:12px 16px}
      .s-card .s-edit{padding:12px 16px}
      .s-edit-grid input,.s-edit-grid select{font-size:.75rem;padding:6px 8px}
      .search-bar{flex-direction:column}
      .search-bar input,.search-bar select{width:100%}
      .add-new{width:48px;height:48px;font-size:1.3rem;bottom:16px;right:16px}
    }
    @media(max-width:480px){
      .page{padding:12px 10px}
      .top-bar .actions a,.top-bar .actions button{font-size:.7rem;padding:5px 8px}
      .s-card-head{gap:10px}
      .s-avatar{width:40px;height:40px;font-size:1rem}
      .s-name{font-size:.9rem}
      .s-row{font-size:.75rem;flex-direction:column;gap:2px}
      .s-value{text-align:left;max-width:100%}
      .s-btns{flex-direction:column}
      .modal-box{padding:20px;border-radius:16px}
      .modal-overlay{padding:16px 10px;align-items:center}
      .f-grid{gap:8px}
      .f-group input,.f-group select,.f-group textarea{font-size:.8rem;padding:8px 10px}
      .f-submit{font-size:.9rem;padding:10px}
      .ps{font-size:.8rem}
      .search-bar input{font-size:.82rem}
      .bg-orb-1{width:250px;height:250px}
      .bg-orb-2{width:200px;height:200px}
      .bg-orb-3{width:150px;height:150px}
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="page">
    <div class="top-bar">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar"></div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-role" id="userRole"></div>
        </div>
      </div>
      <div class="actions">
        <a href="/attendance/"><i class="bi bi-arrow-left"></i> Attendance</a>
        <a href="/"><i class="bi bi-house"></i> Home</a>
        <button onclick="UnifiedAuth.logout();window.location.href='/'"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <img src="/logo.png" alt="Logo" style="width:40px;height:40px;border-radius:10px;" onerror="this.style.display='none'">
      <div>
        <h1 class="pt" style="margin:0;"><i class="bi bi-person-lines-fill"></i> Staff Details</h1>
        <p class="ps" style="margin:0;">Complete personal information and employment details for all staff</p>
      </div>
    </div>

    <div class="search-bar" style="display:flex;align-items:center;gap:8px;">
      <span class="mic-btn" data-target="searchInput" title="Search by voice" id="detailsMicBtn" style="flex-shrink:0;"></span>
      <input type="text" id="searchInput" placeholder="Search by name, ID, phone..." oninput="renderCards()" style="flex:1;">
      <select id="roleFilter" onchange="renderCards()">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="staff">Staff</option>
      </select>
    </div>

    <div class="card-grid" id="cardGrid"></div>
  </div>

  <button class="add-new" id="addBtn" onclick="openAddModal()" title="Add Staff"><i class="bi bi-plus-lg"></i></button>

  <div class="modal-overlay" id="addModal">
    <div class="modal-box" style="position:relative;">
      <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
      <h3 id="modalTitle"><i class="bi bi-person-plus"></i> Add Staff Details</h3>
      <input type="hidden" id="editIdx" value="-1">
      <div class="f-grid">
        <div class="f-section-title full">Personal Information</div>
        <div class="f-group"><label>Full Legal Name *</label><input type="text" id="f_fullName" placeholder="Enter full legal name" required></div>
        <div class="f-group"><label>Date of Birth *</label><input type="date" id="f_dob"></div>
        <div class="f-group"><label>Phone Number *</label><input type="tel" id="f_phone" placeholder="Enter phone number"></div>
        <div class="f-group"><label>Emergency Contact *</label><input type="tel" id="f_emergency" placeholder="Enter emergency contact"></div>
        <div class="f-group full"><label>Home Address *</label><input type="text" id="f_address" placeholder="Enter full home address"></div>

        <div class="f-section-title full">Employment Details</div>
        <div class="f-group"><label>Staff ID</label><input type="text" id="f_staffId" placeholder="Auto-generated" readonly style="opacity:.6"></div>
        <div class="f-group"><label>Job Title *</label><input type="text" id="f_jobTitle" placeholder="e.g. Software Developer"></div>
        <div class="f-group"><label>Qualification *</label>
          <select id="f_qualification">
            <option value="">Select qualification</option>
            <option>High School</option><option>Diploma</option><option>Bachelor's Degree</option>
            <option>Master's Degree</option><option>PhD</option><option>ITI</option><option>Other</option>
          </select>
        </div>
        <div class="f-group"><label>Employment Type *</label>
          <select id="f_empType">
            <option value="">Select type</option>
            <option>Full-time</option><option>Part-time</option><option>Contract</option><option>Intern</option>
          </select>
        </div>
        <div class="f-group"><label>Date of Joining *</label><input type="date" id="f_joinDate"></div>
        <div class="f-group"><label>Work Location</label>
          <select id="f_location">
            <option>Kovilpatti Head Office</option><option>Branch Office</option><option>Remote</option><option>Field</option>
          </select>
        </div>
        <div class="f-group full"><label>Languages Known *</label><input type="text" id="f_languages" placeholder="e.g. English, Hindi, Tamil"></div>

        <div class="f-section-title full">Document Uploads</div>
        <div class="f-group"><label>Aadhaar Card</label><input type="file" id="f_aadhaar" accept=".jpg,.jpeg,.png,.pdf"></div>
        <div class="f-group"><label>Qualification Certificate</label><input type="file" id="f_qualCert" accept=".jpg,.jpeg,.png,.pdf"></div>
      </div>
      <button class="f-submit" onclick="saveRecord()"><i class="bi bi-check-lg"></i> Save Details</button>
    </div>
  </div>

  <script src="secure-api.js"></script>
  <script src="auth.js"></script>
  <script>
    var STORAGE = 'iacss_staff_details_v1';

    (function(){
      if(!UnifiedAuth.isAuthenticated()){window.location.href='/';return}
      var s=UnifiedAuth.getSession();
      if(s.role!=='admin'){window.location.href='/';return}
      document.getElementById('userAvatar').textContent=(s.fullName||s.username).charAt(0).toUpperCase();
      document.getElementById('userName').textContent=s.fullName||s.username;
      document.getElementById('userRole').textContent=s.role;
      renderCards();
    })();

    function getRecords(){
      try{return JSON.parse(localStorage.getItem(STORAGE)||'[]')}catch(e){return[]}
    }

    function saveLocal(recs){
      localStorage.setItem(STORAGE,JSON.stringify(recs));
    }

    function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
    function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return d}}

    function renderCards(){
      var recs=getRecords();
      var search=(document.getElementById('searchInput').value||'').toLowerCase();
      var roleF=document.getElementById('roleFilter').value;
      var filtered=recs.filter(function(r){
        var ms=!search||((r.fullName||'').toLowerCase().includes(search))||((r.staffId||'').toLowerCase().includes(search))||((r.phone||'').includes(search));
        var mr=!roleF||r.role===roleF;
        return ms&&mr;
      });
      var g=document.getElementById('cardGrid');
      if(filtered.length===0){g.innerHTML='<div class="empty"><i class="bi bi-person-x"></i><p>No staff records found. Click + to add.</p></div>';return}
      g.innerHTML=filtered.map(function(r,i){
        var role=r.role||'staff';
        return '<div class="s-card" id="card-'+i+'">'+
          '<div class="s-card-head">'+
            '<div class="s-avatar '+role+'">'+(r.fullName||'?').charAt(0).toUpperCase()+'</div>'+
            '<div><div class="s-name">'+esc(r.fullName)+'</div><span class="s-role '+role+'">'+role+'</span></div>'+
          '</div>'+
          '<div class="s-section">'+
            '<div class="s-sec-title">Personal Information</div>'+
            '<div class="s-row"><span class="s-label">Date of Birth</span><span class="s-value">'+fmtDate(r.dob)+'</span></div>'+
            '<div class="s-row"><span class="s-label">Phone</span><span class="s-value">'+esc(r.phone||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Emergency Contact</span><span class="s-value">'+esc(r.emergency||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Address</span><span class="s-value">'+esc(r.address||'—')+'</span></div>'+
          '</div>'+
          '<div class="s-section">'+
            '<div class="s-sec-title">Employment Details</div>'+
            '<div class="s-row"><span class="s-label">Staff ID</span><span class="s-value">'+esc(r.staffId||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Job Title</span><span class="s-value">'+esc(r.jobTitle||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Qualification</span><span class="s-value">'+esc(r.qualification||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Employment Type</span><span class="s-value">'+esc(r.empType||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Date of Joining</span><span class="s-value">'+fmtDate(r.joinDate)+'</span></div>'+
            '<div class="s-row"><span class="s-label">Work Location</span><span class="s-value">'+esc(r.location||'—')+'</span></div>'+
            '<div class="s-row"><span class="s-label">Languages</span><span class="s-value">'+esc(r.languages||'—')+'</span></div>'+
          '</div>'+
          (r.aadhaar||r.qualCert?'<div class="s-section"><div class="s-sec-title">Documents</div>'+
            (r.aadhaar?(r.aadhaar.indexOf('data:')===0?
              '<div class="s-doc"><i class="bi bi-file-earmark"></i> Aadhaar Card: <a href="'+r.aadhaar+'" target="_blank" style="cursor:pointer">'+esc(r.aadhaarName||'View')+' <i class="bi bi-box-arrow-up-right" style="font-size:.7rem"></i></a></div>':
              '<div class="s-doc"><i class="bi bi-file-earmark"></i> Aadhaar Card: <a href="/uploads/'+r.aadhaar+'" target="_blank" style="cursor:pointer">'+esc(r.aadhaarName||'View')+' <i class="bi bi-box-arrow-up-right" style="font-size:.7rem"></i></a></div>'
            ):'')+
            (r.qualCert?(r.qualCert.indexOf('data:')===0?
              '<div class="s-doc"><i class="bi bi-file-earmark"></i> Qualification Cert: <a href="'+r.qualCert+'" target="_blank" style="cursor:pointer">'+esc(r.qualCertName||'View')+' <i class="bi bi-box-arrow-up-right" style="font-size:.7rem"></i></a></div>':
              '<div class="s-doc"><i class="bi bi-file-earmark"></i> Qualification Cert: <a href="/uploads/'+r.qualCert+'" target="_blank" style="cursor:pointer">'+esc(r.qualCertName||'View')+' <i class="bi bi-box-arrow-up-right" style="font-size:.7rem"></i></a></div>'
            ):'')+
          '</div>':'')+
          '<div class="s-btns" style="padding:10px 20px;border-top:1px solid rgba(255,255,255,.06)">'+
            '<button class="s-btn-edit" onclick="openEditModal('+recs.indexOf(r)+')"><i class="bi bi-pencil"></i> Edit</button>'+
            '<button class="s-btn-del" onclick="deleteRecord('+recs.indexOf(r)+')"><i class="bi bi-trash"></i></button>'+
          '</div>'+
        '</div>';
      }).join('');
    }

    function getNextId(){
      var recs=getRecords();var max=0;
      recs.forEach(function(r){var n=parseInt((r.staffId||'').replace(/\D/g,''),10);if(n>max)max=n});
      return 'STF'+String(max+1).padStart(3,'0');
    }

    function openAddModal(){
      document.getElementById('editIdx').value='-1';
      document.getElementById('modalTitle').innerHTML='<i class="bi bi-person-plus"></i> Add Staff Details';
      ['f_fullName','f_dob','f_phone','f_emergency','f_address','f_jobTitle','f_languages'].forEach(function(id){document.getElementById(id).value=''});
      document.getElementById('f_staffId').value=getNextId();
      document.getElementById('f_qualification').value='';
      document.getElementById('f_empType').value='';
      document.getElementById('f_joinDate').value=new Date().toISOString().split('T')[0];
      document.getElementById('f_location').value='Kovilpatti Head Office';
      document.getElementById('f_aadhaar').value='';
      document.getElementById('f_qualCert').value='';
      document.getElementById('addModal').classList.add('active');
    }

    function openEditModal(idx){
      var recs=getRecords();var r=recs[idx];if(!r)return;
      document.getElementById('editIdx').value=idx;
      document.getElementById('modalTitle').innerHTML='<i class="bi bi-pencil"></i> Edit Staff Details';
      document.getElementById('f_fullName').value=r.fullName||'';
      document.getElementById('f_dob').value=r.dob||'';
      document.getElementById('f_phone').value=r.phone||'';
      document.getElementById('f_emergency').value=r.emergency||'';
      document.getElementById('f_address').value=r.address||'';
      document.getElementById('f_staffId').value=r.staffId||'';
      document.getElementById('f_jobTitle').value=r.jobTitle||'';
      document.getElementById('f_qualification').value=r.qualification||'';
      document.getElementById('f_empType').value=r.empType||'';
      document.getElementById('f_joinDate').value=r.joinDate||'';
      document.getElementById('f_location').value=r.location||'Kovilpatti Head Office';
      document.getElementById('f_languages').value=r.languages||'';
      document.getElementById('f_aadhaar').value='';
      document.getElementById('f_qualCert').value='';
      document.getElementById('addModal').classList.add('active');
    }

    function closeModal(id){document.getElementById(id).classList.remove('active')}

    function uploadFile(file){
      return new Promise(function(resolve){
        if(!file){resolve(null);return}
        var fd=new FormData();
        fd.append('file',file);
        fetch('/api/upload',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
          if(d.success){resolve({filename:d.filename,original:d.original})}else{resolve(null)}
        }).catch(function(){resolve(null)});
      });
    }

    async function saveRecord(){
      var idx=parseInt(document.getElementById('editIdx').value);
      var fullName=document.getElementById('f_fullName').value.trim();
      if(!fullName){alert('Full name is required');return}
      var aadhaarFile=document.getElementById('f_aadhaar').files[0];
      var qualCertFile=document.getElementById('f_qualCert').files[0];
      var [aadhaarRes,qualCertRes]=await Promise.all([uploadFile(aadhaarFile),uploadFile(qualCertFile)]);
      var rec={
        fullName:fullName,
        dob:document.getElementById('f_dob').value,
        phone:document.getElementById('f_phone').value.trim(),
        emergency:document.getElementById('f_emergency').value.trim(),
        address:document.getElementById('f_address').value.trim(),
        staffId:document.getElementById('f_staffId').value,
        jobTitle:document.getElementById('f_jobTitle').value.trim(),
        qualification:document.getElementById('f_qualification').value,
        empType:document.getElementById('f_empType').value,
        joinDate:document.getElementById('f_joinDate').value,
        location:document.getElementById('f_location').value,
        languages:document.getElementById('f_languages').value.trim(),
        role:UnifiedAuth.getSession().role
      };
      var recs=getRecords();
      if(idx>=0){
        var old=recs[idx];
        rec.aadhaar=aadhaarRes?aadhaarRes.filename:(old.aadhaar||null);
        rec.aadhaarName=aadhaarRes?aadhaarRes.original:(old.aadhaarName||null);
        rec.qualCert=qualCertRes?qualCertRes.filename:(old.qualCert||null);
        rec.qualCertName=qualCertRes?qualCertRes.original:(old.qualCertName||null);
        recs[idx]=rec;
      } else {
        rec.aadhaar=aadhaarRes?aadhaarRes.filename:null;
        rec.aadhaarName=aadhaarRes?aadhaarRes.original:null;
        rec.qualCert=qualCertRes?qualCertRes.filename:null;
        rec.qualCertName=qualCertRes?qualCertRes.original:null;
        recs.push(rec);
      }
      saveLocal(recs);
      closeModal('addModal');
      renderCards();
    }

    function deleteRecord(idx){
      if(!confirm('Delete this staff record?'))return;
      var recs=getRecords();var r=recs[idx];
      fetch('/api/att/staff/'+encodeURIComponent(r.staffId),{method:'DELETE'}).catch(function(){});
      recs.splice(idx,1);
      saveLocal(recs);
      renderCards();
    }

    document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeModal('addModal')});

    (function(){
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      var btn = document.getElementById('detailsMicBtn');
      var input = document.getElementById('searchInput');
      if(!btn || !input || !SpeechRecognition) return;
      var recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-IN';
      var finalText = '';
      btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
      btn.style.cursor = 'pointer';
      btn.title = 'Click to speak';
      recognition.onresult = function(e){
        var interim = '';
        for(var i = e.resultIndex; i < e.results.length; i++){
          if(e.results[i].isFinal) finalText += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        input.value = finalText + interim;
        input.dispatchEvent(new Event('input', {bubbles:true}));
      };
      recognition.onend = function(){
        btn.classList.remove('recording');
        input.value = finalText.trim();
        input.dispatchEvent(new Event('input', {bubbles:true}));
        finalText = '';
      };
      recognition.onerror = function(){ btn.classList.remove('recording'); finalText = ''; };
      btn.addEventListener('click', function(e){
        e.preventDefault();
        if(btn.classList.contains('recording')){ recognition.stop(); }
        else { finalText = input.value || ''; btn.classList.add('recording'); recognition.start(); }
      });
    })();
  </script>
